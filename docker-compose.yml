version: '3.7'

services:
  fuseki:
    container_name: skosmos-fuseki
    hostname: fuseki
    image: stain/jena-fuseki
    environment:
      - ADMIN_PASSWORD=admin
      - JVM_ARGS=-Xmx2g
    ports:
      - 9030:3030
    volumes:
      - type: bind
        source: ./fuseki-data
        target: /fuseki
  fuseki-cache:
    container_name: skosmos-fuseki-cache
    hostname: fuseki-cache
    image: varnish
    ports:
      - 9031:80
    volumes:
      - type: bind
        source: ./config/varnish-default.vcl
        target: /etc/varnish/default.vcl
  skosmos:
    container_name: skosmos-web
    hostname: skosmos
    build:
      context: ./Skosmos  # Skosmos git repository clone
      dockerfile: ./dockerfiles/Dockerfile.ubuntu
    ports:
      - 9090:80
    depends_on:
      - fuseki
      - fuseki-cache
    volumes:
      - type: bind
        source: ./config/config-docker-compose.ttl
        target: /var/www/html/config.ttl
